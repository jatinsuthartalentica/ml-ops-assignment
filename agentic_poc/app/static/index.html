<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic AI & MLOps Platform</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    <div class="container">
        <header>
            <h1>Agentic AI Core</h1>
            <p>Empowered by LangGraph & MLOps integration</p>
        </header>

        <div class="chat-container">
            <div id="chat-box" class="chat-box">
                <div class="message bot">
                    <div class="avatar">AI</div>
                    <div class="content">Hello! I am your autonomous enterprise agent. How can I assist you today? Try asking about our company policies or to search OpenML for a dataset!</div>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="loading-indicator" id="loading" style="display: none;">
                <div class="spinner"></div>
                <span>Agent is reasoning...</span>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
